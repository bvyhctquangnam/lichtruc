<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch trực Bệnh viện YHCT Quảng Nam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* Fallback khi iframe chưa tải xong */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 18px;
            color: #00008B;
            z-index: 999;
            transition: opacity 0.5s ease;
        }
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading .spinner {
            width: 40px;
            height: 40px;
            margin-right: 16px;
            border: 4px solid #e0e7ff;
            border-top-color: #00008B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Đang tải lịch trực...</span>
    </div>

    <iframe
        src="https://script.google.com/macros/s/AKfycbwjnZ9aLaSRGZBQRAGEDgSlw1r-Rd5GjUWmlxGFIZMFJrCGkFJ14Hytv4tHgFwxvJWk/exec"
        onload="document.getElementById('loading').classList.add('hidden')"
        onerror="document.getElementById('loading').innerHTML = '⚠️ Không thể tải trang. Vui lòng kiểm tra kết nối hoặc thử lại sau.'"
    ></iframe>

</body>
</html>
